<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Witamy w LabSystem</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/SG.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="video-bg">
    <video autoplay muted loop playsinline id="myVideo">
        <source th:src="@{/video/backgroundSG/backgroundSG.mp4}" type="video/mp4">
        Twoja przeglądarka nie obsługuje wideo.
    </video>
    <div class="overlay"></div>
</div>

<div class="portal-container">
    <header class="main-header">
        <h1>SYSTEM LABORATORYJNY</h1>
        <p>Wybierz akcję, aby kontynuować</p>
    </header>

    <div class="dashboard-grid">
        <a th:href="@{/login}" class="card">
            <i class="fas fa-sign-in-alt"></i>
            <h3>Logowanie</h3>
            <p>Zaloguj się do swojego konta</p>
        </a>

        <a th:href="@{/register}" class="card">
            <i class="fas fa-user-plus"></i>
            <h3>Rejestracja</h3>
            <p>Załóż nowe konto w systemie</p>
        </a>

        <a th:href="@{/forgot-password}" class="card">
            <i class="fas fa-key"></i>
            <h3>Hasło</h3>
            <p>Odzyskaj dostęp do konta</p>
        </a>
    </div>
</div>

</body>
</html>
