<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Błąd | LabSystem</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/SG.css}"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .error-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: var(--accent-color); /* Twoja mięta */
            line-height: 1;
        }
        .error-msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="video-bg">
    <video autoplay muted loop playsinline>
        <source th:src="@{/video/backgroundSG/backgroundSG.mp4}" type="video/mp4">
    </video>
    <div class="overlay"></div>
</div>

<div class="error-container">
    <div class="error-box">
        <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #e74c3c;"></i>
        <h1 class="error-code" th:text="${status}">404</h1>
        <p class="error-msg" th:text="${error}">Ups! Coś poszło nie tak.</p>

        <a th:href="@{/}" class="btn-base btn-primary">
            <i class="fas fa-home"></i> Wróć do portalu
        </a>
    </div>
</div>

</body>
</html>
